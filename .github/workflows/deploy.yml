name: Deploy Admin — Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Patch start script for Azure Oryx
        run: |
          node -e "
            const fs = require('fs');
            const path = '.next/standalone/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.scripts = { ...pkg.scripts, start: 'node server.js' };
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
          "

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-sodisa-mvp-admin
          package: .next/standalone
