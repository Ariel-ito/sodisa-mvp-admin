name: PR Check — Admin

on:
  pull_request:
    branches: [main, qa, staging, develop]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://app-sodisa-mvp-api.azurewebsites.net
